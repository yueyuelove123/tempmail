server {
    # ★ Nginx 容器内监听端口
    # 默认 80。如果你在 docker-compose.yml 修改了宿主机→容器的映射
    # （例如改成 "8888:80"），这里不需要动，宿主机端口映射与此无关。
    #
    # 如果你确实需要改容器内端口（一般没必要），需同步修改：
    #   1. docker-compose.yml 中 frontend 的 ports 右边数字
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # 静态资源长期缓存（js/css 通过 ?v=N 版本号更新）
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location /api/ {
        # ★ 反向代理到 Go API 的容器内地址
        # "api" 是 docker-compose.yml 中 api 服务的名称（Docker 内部 DNS）
        # "8967" 是 API 容器内的监听端口，由 .env 的 API_PORT 决定。
        # 如果你修改了 API_PORT（比如改成 9000），需要把下面三个
        # proxy_pass 里的 8967 全部改成 9000：
        proxy_pass          http://api:8967/api/;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }

    location /public/ {
        # ★ 同上，如果修改了 API_PORT，这里也要同步改
        proxy_pass          http://api:8967/public/;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  30s;
    }

    location /health {
        # ★ 同上，如果修改了 API_PORT，这里也要同步改
        proxy_pass          http://api:8967/health;
        proxy_set_header    Host $host;
    }

    # index.html 直接命中时禁止缓存
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # SPA 路由：未匹配的路径重写到 /index.html（精确匹配，触发上面的 location = /index.html）
    location / {
        rewrite ^ /index.html last;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;
}
